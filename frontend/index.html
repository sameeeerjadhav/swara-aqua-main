<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Swara Aqua — Water Jar Delivery</title>
    <meta name="description" content="Fresh water jar delivery at your doorstep. Order instantly, track your delivery, manage your account." />

    <!-- PWA meta -->
    <meta name="theme-color" content="#1248b8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Swara Aqua" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Performance: preconnect to font origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- DNS prefetch for API -->
  <link rel="dns-prefetch" href="https://swaraaqua.labxco.in" />

  <!--
    Non-blocking font load: media=print means it won't block render;
    onload switches it back to 'all' once downloaded.
    Both Inter + DM Sans merged into one request.
  -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <!-- Fallback for no-JS -->
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" />
  </noscript>


    <!-- Open Graph (for WhatsApp/social sharing) -->
    <meta property="og:title" content="Swara Aqua — Water Jar Delivery" />
    <meta property="og:description" content="Order fresh water jars delivered to your doorstep. Fast, reliable, and affordable." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:url" content="/" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
